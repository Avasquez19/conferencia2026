<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  >

  <meta
    name="description"
    content="Escáner QR para el control de ingreso a la conferencia"
  >

  <title>Escáner - Conferencia</title>

  <link rel="stylesheet" href="style.css">

  <!-- Librería de lectura QR -->
  <script
    src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
    defer
  ></script>

  <script src="app.js" defer></script>
</head>

<body>
  <main class="contenedor">
    <header class="encabezado">
      <div class="icono-evento">✿</div>
      <h1>Conferencia de Damas</h1>
      <p>Control de ingreso</p>
    </header>

    <!-- Navegación entre modos -->
    <nav class="selector-modo" aria-label="Tipo de búsqueda">
      <button
        id="tabQr"
        type="button"
        class="tab activo"
        onclick="mostrarModoQr()"
      >
        Escanear QR
      </button>

      <button
        id="tabManual"
        type="button"
        class="tab"
        onclick="mostrarModoManual()"
      >
        Búsqueda manual
      </button>
    </nav>

    <!-- Modo QR -->
    <section id="modoQr" class="tarjeta">
      <h2>Escanear código QR</h2>

      <p class="instruccion">
        Activa la cámara y apunta al QR de la participante.
      </p>

      <div id="lectorQr" class="lector-qr"></div>

      <button
        id="botonIniciar"
        type="button"
        class="boton boton-principal"
        onclick="iniciarCamara()"
      >
        Activar cámara
      </button>

      <button
        id="botonDetener"
        type="button"
        class="boton boton-secundario oculto"
        onclick="detenerCamara()"
      >
        Detener cámara
      </button>
    </section>

    <!-- Modo manual -->
    <section id="modoManual" class="tarjeta oculto">
      <h2>Búsqueda manual</h2>

      <p class="instruccion">
        Utiliza esta opción si el QR no puede leerse.
      </p>

      <label for="codigoManual">Código de inscripción</label>

      <input
        id="codigoManual"
        type="text"
        placeholder="CONF26-XXXXX"
        autocomplete="off"
        autocapitalize="characters"
        spellcheck="false"
        maxlength="20"
      >

      <button
        type="button"
        class="boton boton-principal"
        onclick="abrirBusquedaManual()"
      >
        Buscar inscripción
      </button>
    </section>

    <!-- Mensajes -->
    <section
      id="mensaje"
      class="mensaje oculto"
      role="status"
      aria-live="polite"
    ></section>

    <footer>
      Uso exclusivo del equipo organizador
    </footer>
  </main>
</body>
</html>
